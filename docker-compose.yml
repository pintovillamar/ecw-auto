services:
  gdal-ecw:
    build:
      context: ./gdal-server
      dockerfile: Dockerfile
    container_name: gdal-ecw
    volumes:
      - ./workspace:/workspace
    ports:
      - "5000:5000"
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      - PYTHONUNBUFFERED=1

  tileserver:
    build:
      context: ./tileserver
      dockerfile: Dockerfile
    container_name: tileserver-gl
    volumes:
      - ./workspace:/data
    ports:
      - "8081:8080"
    depends_on:
      - gdal-ecw
    restart: unless-stopped
